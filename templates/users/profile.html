{% extends 'base.html' %}

{% block content %}

<h2>Profile</h2>

{% if user.avatar %}
<img
src="{{ user.avatar.url }}"
width="150"
class="rounded-circle">
{% endif %}

<hr>

<form
method="POST"
enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button
class="btn btn-primary">

Update Profile

</button>

</form>

{% endblock %}
