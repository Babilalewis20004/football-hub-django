{% extends 'base.html' %}

{% block content %}

<h1>{{ category.name }}</h1>

{% for post in posts %}

<div class="card mb-3">
    <div class="card-body">

        <h4>{{ post.title }}</h4>

        <a href="{{ post.get_absolute_url }}">
            Read More
        </a>

    </div>
</div>

{% endfor %}

{% endblock %}
